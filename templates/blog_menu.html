{% if path == "root" %}
{% for page in subject['paths'][path] %}
<li><a class="dropdown-item" href="{{ url_for('blog.page', subject=subject['name'], id=page[1]) }}">{{
        page[0].split('.')[0] }}</a>
</li>
{% endfor %}
{% endif %}
<li>
    <hr class="dropdown-divider">
</li>
<li><a class="dropdown-item" href="#">Separated link</a></li>
{% endfor %}
{% endif %}
