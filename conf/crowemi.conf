server {
    listen 8080;
    server_name crowemi www.crowemi;

    location / {
        include uwsgi_params;
        uwsgi_pass unix:/app/crowemi.sock;
    }
}

server {
    listen 8080;
    server_name blog.crowemi.com;

    location / {
        include uwsgi_params;
        uwsgi_pass unix:/app/blog/blog.sock;
    }
}